services:
  postgres:
    image: postgres:16-alpine
    container_name: gpt-image-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gpt_image}
      POSTGRES_USER: ${POSTGRES_USER:-gpt_image}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gpt_image} -d ${POSTGRES_DB:-gpt_image}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/xinghe118/gpt-image:latest
    container_name: gpt-image
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:80"
    volumes:
      - ./data:/app/data
      - ./config.json:/app/config.json:ro
    environment:
      STORAGE_BACKEND: postgres
      DATABASE_URL: postgresql://${POSTGRES_USER:-gpt_image}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-gpt_image}
      # 认证密钥可通过 .env 覆盖 config.json。
      GPT_IMAGE_AUTH_KEY: ${GPT_IMAGE_AUTH_KEY:-}
      # 基础 URL 可选，例如 https://img.example.com。
      GPT_IMAGE_BASE_URL: ${GPT_IMAGE_BASE_URL:-}

volumes:
  postgres-data:
